<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Jetski Mahakam</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>Jetski Mahakam</span>
            </a>

            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Beranda</a>
                <a href="about.html" class="nav-link">Tentang Kami</a>
                <a href="catalog.html" class="nav-link">Katalog</a>
                <a href="gallery.html" class="nav-link">Galeri</a>
                <a href="login.html" class="btn-outline">Admin Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="login-page">
        <div class="login-card">
            <div class="card-header">
                <h1>Admin Login</h1>
                <p>Masuk untuk mengakses dashboard admin</p>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>

                <div class="demo-credentials">
                    <p class="demo-title">Demo Credentials:</p>
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>

                <div id="loginError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
    <script src="login.js"></script>
</body>
</html>
